<svg xmlns="http://www.w3.org/2000/svg" width="800" height="340" viewBox="0 0 800 340">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&amp;display=swap');
      .t { font-family: 'JetBrains Mono', monospace; font-size: 13px; }
      .fg { fill: #f8f8f2; }
      .cm { fill: #6272a4; }
      .gr { fill: #50fa7b; }
      .pk { fill: #ff79c6; }
      .yl { fill: #f1fa8c; }
      .cy { fill: #8be9fd; }
      .or { fill: #ffb86c; }
    </style>
  </defs>

  <!-- Window -->
  <rect width="800" height="340" rx="10" ry="10" fill="#282a36"/>
  <rect width="800" height="36" rx="10" ry="10" fill="#21222c"/>
  <rect y="20" width="800" height="16" fill="#21222c"/>

  <!-- Traffic lights -->
  <circle cx="20" cy="18" r="6" fill="#ff5f56"/>
  <circle cx="40" cy="18" r="6" fill="#ffbd2e"/>
  <circle cx="60" cy="18" r="6" fill="#27c93f"/>

  <text x="400" y="22" text-anchor="middle" class="t cm" font-size="12">hyosua@parrot  ~/projects</text>

  <!-- Prompt -->
  <text y="64" class="t">
    <tspan x="20" class="gr">❯</tspan>
    <tspan class="fg"> ls -la</tspan>
  </text>

  <!-- Header -->
  <text y="90" class="t">
    <tspan x="20" class="cm">project</tspan>
    <tspan x="190" class="cm">description</tspan>
    <tspan x="580" class="cm">stack</tspan>
  </text>
  <text y="104" class="t">
    <tspan x="20" class="cm">───────────────────────────────────────────────────────────────────────────────────────</tspan>
  </text>

  <!-- hellmet -->
  <text y="126" class="t">
    <tspan x="20" class="pk">hellmet</tspan>
    <tspan x="190" class="fg">Analyse statique, détection vulnérabilités OWASP</tspan>
    <tspan x="580" class="yl">ts next regex</tspan>
  </text>

  <!-- cadavrexquis -->
  <text y="152" class="t">
    <tspan x="20" class="pk">cadavrexquis</tspan>
    <tspan x="190" class="fg">Temps réel, agent IA, cache basse latence</tspan>
    <tspan x="580" class="yl">next redis ws</tspan>
  </text>

  <!-- peakture -->
  <text y="178" class="t">
    <tspan x="20" class="pk">peakture</tspan>
    <tspan x="190" class="fg">Pipeline upload, auth JWT, API REST</tspan>
    <tspan x="580" class="yl">node mongo react</tspan>
  </text>

  <!-- sygma -->
  <text y="204" class="t">
    <tspan x="20" class="pk">sygma</tspan>
    <tspan x="190" class="fg">Numérisation émargement scolaire, full-stack</tspan>
    <tspan x="580" class="yl">laravel pg react</tspan>
  </text>

  <!-- miaw-techwear -->
  <text y="230" class="t">
    <tspan x="20" class="pk">miaw-techwear</tspan>
    <tspan x="190" class="fg">E-commerce, thème WordPress custom</tspan>
    <tspan x="580" class="yl">wordpress php</tspan>
  </text>

  <!-- Separator -->
  <text y="256" class="t">
    <tspan x="20" class="cm">───────────────────────────────────────────────────────────────────────────────────────</tspan>
  </text>

  <!-- Summary line -->
  <text y="278" class="t">
    <tspan x="20" class="cm">total</tspan>
    <tspan class="fg"> 5 projects</tspan>
    <tspan class="cm">  ·  </tspan>
    <tspan class="cy">3 deployed</tspan>
    <tspan class="cm">  ·  </tspan>
    <tspan class="gr">2 open-source</tspan>
  </text>

  <!-- Next prompt -->
  <text y="308" class="t">
    <tspan x="20" class="gr">❯</tspan>
  </text>

  <!-- Blinking cursor -->
  <rect x="36" y="300" width="8" height="15" fill="#f8f8f2">
    <animate attributeName="opacity" values="1;0;1" dur="1.2s" repeatCount="indefinite"/>
  </rect>

</svg>
